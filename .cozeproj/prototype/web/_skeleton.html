<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体：Nunito（圆润现代无衬线）+ Noto Sans SC（中文） -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #5B6CFF;
      --color-primary-container:    #E0E3FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F7F8FF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EEF0FF;
      --color-surface-container-high:     #E4E6F7;
      --color-surface-container-highest:  #D8DBF0;
      /* === 文字 === */
      --color-on-surface:           #1F2433;
      --color-on-surface-variant:   #6B7294;
      /* === 功能色 === */
      --color-success:  #55C59D;
      --color-error:    #EF4444;
      --color-warning:  #FFD166;
      /* === 装饰色（教育风活力色） === */
      --color-accent-yellow:  #FFD166;
      --color-accent-pink:    #FF7AB6;
      --color-accent-green:   #55C59D;
      /* === 边框 === */
      --color-outline:          #C7CADB;
      --color-outline-variant:  #E0E2EF;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-sans: "Nunito", "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-surface sticky top-0 z-40 shadow-card">
    <div class="max-w-6xl mx-auto h-16 flex items-center justify-between px-6">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center">
          <i data-lucide="code" class="w-5 h-5 text-on-primary"></i>
        </div>
        <span class="font-bold text-lg text-on-surface">码上成长</span>
        <span class="text-xs text-on-surface-variant bg-surface-container px-2 py-0.5 rounded-full ml-1">Python 评价助手</span>
      </div>
      <nav class="flex items-center gap-1">
        <a href="home.html" class="nav-link px-4 py-2 text-sm font-semibold text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-lg transition-colors flex items-center gap-1.5">
          <i data-lucide="message-square-code" class="w-4 h-4"></i>代码评价
        </a>
        <a href="statistics.html" class="nav-link px-4 py-2 text-sm font-semibold text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-lg transition-colors flex items-center gap-1.5">
          <i data-lucide="bar-chart" class="w-4 h-4"></i>学情统计
        </a>
      </nav>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-6xl mx-auto px-6 py-8">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
